<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>피쉬팡 Fishpang</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #0b1220;
      text-align: center;
      padding: 80px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .logo {
      margin-bottom: 30px;
    }

    .logo img {
      width: 220px;
      height: auto;
    }

    h1 {
      font-size: 52px;
      margin: 0 0 20px;
      color: #0f3e9f;
    }

    .subtitle {
      font-size: 24px;
      color: #4b5b76;
      margin-bottom: 40px;
    }

    .button {
      display: inline-block;
      background: #1e6bff;
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      margin-top: 20px;
    }

    .features {
      margin-top: 60px;
      display: grid;
      gap: 16px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    .feature {
      border: 1px solid #d9e7ff;
      border-radius: 16px;
      padding: 20px;
      background: #f7fbff;
      font-size: 18px;
      color: #0f3e9f;
      font-weight: bold;
    }

    footer {
      margin-top: 60px;
      color: #6d7b95;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="/appstatic-site/fishpang-logo.png" alt="Fishpang Logo" />
    </div>

    <h1>수산 유통의 흐름을 바꾼다</h1>
    <div class="subtitle">주문 관리와 배송을 하나의 플랫폼에서</div>

    <a class="button" href="https://app.fishpang.kr">주문 시스템 시작</a>

    <div class="features">
      <div class="feature">실시간 주문 시스템</div>
      <div class="feature">배송 / 배차 관리</div>
      <div class="feature">거래처 전용 주문 페이지</div>
    </div>

    <footer>© Fishpang Co., Ltd.</footer>
  </div>
</body>
</html>
